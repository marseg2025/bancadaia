<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Bancada IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bay:#0b1418;--panel:#132128;--panel-2:#0f1a20;--rule:#273c46;--rule-soft:#1c2c34;
  --amber:#f0a835;--amber-dim:#8a6425;--phos:#6bb8cc;--over:#d9553f;
  --ink:#d8e5ea;--dim:#7a939d;--dimmer:#4d666f;--ok:#7fb87a;
  --lcd:#b9c6ae;--lcd-deep:#a9b79f;--seg:#232b20;--seg-dim:#5d6a56;--seg-ghost:rgba(35,43,32,.10);
  --label:"Saira Condensed",Arial Narrow,sans-serif;
  --body:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bay);color:var(--ink);font-family:var(--body);font-size:14px;
  line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
.lab{font-family:var(--label);text-transform:uppercase;letter-spacing:.14em;font-weight:600}

/* shell */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;height:var(--app-h,100dvh);min-height:0}
header{flex:none;display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:linear-gradient(180deg,#182931,#101c22);border-bottom:1px solid var(--rule)}
.brand{font-family:var(--label);font-weight:700;font-size:16px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--amber);white-space:nowrap}
.brand span{color:var(--dimmer);font-weight:500}
#taskTitle{flex:1;min-width:0;background:var(--panel-2);border:1px solid var(--rule-soft);
  color:var(--ink);font-family:var(--body);font-size:13px;padding:5px 9px;border-radius:2px}
#taskTitle:focus{outline:none;border-color:var(--amber-dim)}
.hdr-actions{display:flex;gap:5px;flex-shrink:0}

/* layout */
#body{flex:1;min-height:0;display:grid;grid-template-columns:290px minmax(0,1fr)}
#rack{border-right:1px solid var(--rule);background:var(--panel-2);
  overflow-y:auto;padding:12px 11px 40px;min-height:0}
#benchCol{display:flex;flex-direction:column;min-height:0}

/* buttons */
button{font-family:var(--label);text-transform:uppercase;letter-spacing:.1em;font-weight:600;
  font-size:11px;background:#1b2c34;color:var(--ink);border:1px solid var(--rule);
  padding:6px 11px;border-radius:2px;cursor:pointer;transition:.12s}
button:hover{border-color:var(--amber-dim);color:var(--amber)}
button:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
button.primary{background:var(--amber);color:#0b1418;border-color:var(--amber)}
button.primary:hover{background:#ffbf52;color:#0b1418}
button.primary:disabled{background:var(--amber-dim);border-color:var(--amber-dim);color:#0b1418;cursor:not-allowed}
button.ghost{background:transparent;border-color:var(--rule-soft);color:var(--dim)}
button.ghost:hover{color:var(--amber)}
button.tiny{padding:3px 7px;font-size:10px}

/* inputs */
input[type=text],input[type=password],textarea,select{
  width:100%;background:var(--panel-2);border:1px solid var(--rule-soft);color:var(--ink);
  font-family:var(--mono);font-size:12px;padding:6px 8px;border-radius:2px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--amber-dim)}
textarea{resize:vertical;line-height:1.55}
.hint{font-size:11px;color:var(--dimmer);line-height:1.45}
a{color:var(--phos)}
.row{display:flex;gap:8px;align-items:center}

/* sect */
.sect{margin-bottom:18px}
.sect-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-family:var(--label);
  text-transform:uppercase;letter-spacing:.16em;font-size:11px;font-weight:600;color:var(--dim)}
.sect-hd:after{content:"";flex:1;height:1px;background:var(--rule-soft)}
.fld{margin-bottom:6px}
.fld label{display:block;font-family:var(--label);font-size:9.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--dim);margin-bottom:3px}

/* channel */
.chan{background:var(--panel);border:1px solid var(--rule-soft);border-radius:3px;margin-bottom:7px;padding:8px 9px}
.chan.on{border-color:var(--rule)}
.chan-hd{display:flex;align-items:center;gap:8px;cursor:pointer}
.chan-name{font-family:var(--label);font-size:13px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;flex:1}
.chan.on .chan-name{color:var(--amber)}
.chan-hd .caps{font-family:var(--mono);font-size:9px;color:var(--dimmer)}
.sw{width:30px;height:16px;border-radius:9px;background:#0a1216;border:1px solid var(--rule);
  position:relative;flex:0 0 auto;transition:.15s}
.sw:after{content:"";position:absolute;top:1px;left:1px;width:12px;height:12px;
  border-radius:50%;background:var(--dimmer);transition:.15s}
.chan.on .sw{background:var(--amber-dim);border-color:var(--amber)}
.chan.on .sw:after{left:15px;background:var(--amber)}
.chan-body{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--rule-soft)}
.chan.on .chan-body{display:block}

/* meters */
.meter{margin-top:7px}
.meter-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.meter-cap{font-family:var(--label);font-size:9px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
.readout{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--amber);font-variant-numeric:tabular-nums}
.readout.over{color:var(--over)}
.scale{height:8px;background:#080f13;border:1px solid var(--rule-soft);border-radius:1px;position:relative;overflow:hidden}
.scale:before{content:"";position:absolute;inset:0;z-index:2;
  background:repeating-linear-gradient(90deg,transparent 0 24.9%,var(--rule-soft) 24.9% 25.1%)}
.fill{height:100%;background:var(--amber);width:0;transition:width .25s ease}
.fill.warn{background:#e0812f}.fill.over{background:var(--over)}
.meter-sub{font-family:var(--mono);font-size:9.5px;color:var(--dimmer);margin-top:3px}

/* files */
.file{display:flex;align-items:center;gap:7px;background:var(--panel);
  border:1px solid var(--rule-soft);border-radius:2px;padding:5px 8px;margin-bottom:5px}
.file .nm{font-family:var(--mono);font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file .tk{font-family:var(--mono);font-size:10px;color:var(--dim)}
.pill{font-family:var(--mono);font-size:9.5px;padding:1px 6px;border-radius:8px;border:1px solid var(--rule);color:var(--dim)}
.empty{border:1px dashed var(--rule-soft);border-radius:3px;padding:12px;color:var(--dimmer);font-size:12px}

/* DISPLAY */
#display{flex:1;min-height:0;display:flex;flex-direction:column;
  margin:12px 16px 0;background:linear-gradient(180deg,#18262e,#0e181e);
  border:1px solid var(--rule);border-radius:5px;padding:8px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 4px 14px rgba(0,0,0,.4)}
#annun{flex:none;display:flex;align-items:center;gap:10px;padding:3px 8px 6px;overflow-x:auto}
#annun .an{font-family:var(--label);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dimmer);white-space:nowrap}
#annun .an.lit{color:var(--amber)}
#annun .spacer{flex:1}
#annun .tk{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap}
#lcd{flex:1;min-height:0;overflow-y:auto;
  background:radial-gradient(120% 90% at 50% 0%,rgba(255,255,255,.14),transparent 55%),
    linear-gradient(180deg,var(--lcd),var(--lcd-deep));
  border:1px solid #05090b;border-radius:3px;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.35);
  padding:12px 14px 16px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}

/* idle */
.lcd-idle{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;min-height:180px;padding:10px 0}
.lcd-idle .mestre{width:min(200px,55%);height:auto;display:block}
.lcd-idle .zzz path{animation:zdorme 3s ease-in-out infinite;opacity:.25}
.lcd-idle .zzz .z2{animation-delay:1s}.lcd-idle .zzz .z3{animation-delay:2s}
@keyframes zdorme{0%,100%{opacity:.25}50%{opacity:1}}
.lcd-idle p{font-family:var(--body);font-size:11.5px;max-width:380px;
  text-align:center;color:var(--seg-dim);padding:0 8px}

/* turns */
.turn{border-left:3px solid rgba(35,43,32,.25);background:var(--seg-ghost);border-radius:2px;margin-bottom:9px}
.turn.user{border-left-color:rgba(20,60,70,.55);background:rgba(20,60,70,.08)}
.turn.pinned{border-left-color:rgba(35,43,32,.65)}
.turn.user.pinned{border-left-color:rgba(15,75,90,.8)}
.turn-hd{display:flex;align-items:center;gap:6px;padding:5px 9px 2px;flex-wrap:wrap}
.turn-hd .who{font-family:var(--label);letter-spacing:.14em;text-transform:uppercase;
  font-weight:700;font-size:10.5px;color:var(--seg)}
.turn.user .turn-hd .who{color:#0f4b5a}
.turn-hd .meta{color:var(--seg-dim);font-family:var(--mono);font-size:9.5px;flex:1;
  min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.turn-hd button{background:transparent;border-color:rgba(35,43,32,.3);color:var(--seg-dim)}
.turn-hd button:hover{color:var(--seg);border-color:var(--seg)}
.turn-body{padding:2px 11px 9px;font-family:var(--mono);font-size:12.5px;line-height:1.6;
  white-space:pre-wrap;word-break:break-word;color:var(--seg)}
.turn-body.collapsed{max-height:74px;overflow:hidden;cursor:pointer;
  -webkit-mask-image:linear-gradient(180deg,#000 40%,transparent);
  mask-image:linear-gradient(180deg,#000 40%,transparent)}

/* jury */
#juryWrap{margin-bottom:9px}
#juryWrap .jury-hd{font-family:var(--label);font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--seg-dim);margin-bottom:6px}
#jury{display:grid;gap:8px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.jcol{border:1px solid rgba(35,43,32,.3);border-radius:2px;background:var(--seg-ghost);display:flex;flex-direction:column}
.jcol-hd{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid rgba(35,43,32,.2)}
.jcol-hd .who{font-family:var(--label);text-transform:uppercase;letter-spacing:.12em;
  font-size:10.5px;color:var(--seg);flex:1;font-weight:700}
.jcol-hd button{background:transparent;border-color:rgba(35,43,32,.3);color:var(--seg-dim)}
.jcol-hd button:hover{color:var(--seg);border-color:var(--seg)}
.jcol-body{padding:8px;font-family:var(--mono);font-size:11.5px;line-height:1.6;
  white-space:pre-wrap;word-break:break-word;max-height:340px;overflow:auto;flex:1;
  color:var(--seg);-webkit-overflow-scrolling:touch}
.jcol.err .jcol-hd .who,.jcol.err .jcol-body{color:#8a2f1d}
.spin{display:inline-block;width:9px;height:9px;border:1.5px solid var(--seg-dim);
  border-top-color:var(--seg);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* CONSOLE */
#console{flex:none;padding:10px 16px 12px}
.console-inner{border:1px solid var(--rule);border-radius:3px;background:var(--panel-2);padding:9px}
.mode-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:7px}
.mode-btn{background:transparent;border-color:var(--rule-soft);color:var(--dim)}
.mode-btn.sel{background:var(--rule-soft);border-color:var(--amber-dim);color:var(--amber)}
.prompt-row{display:flex;gap:7px;align-items:flex-end}
#prompt{flex:1;min-height:44px;max-height:160px;font-size:14px;resize:none;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.prompt-side{display:flex;flex-direction:column;gap:5px}
#btnMic{padding:9px 12px;font-size:15px;line-height:1}
#btnSend{padding:9px 16px;font-size:12px}
#btnMic.rec{background:var(--over);border-color:var(--over);color:#fff;
  animation:micpulse 1.1s ease-in-out infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(217,85,63,.5)}50%{box-shadow:0 0 0 7px rgba(217,85,63,0)}}
.send-row{display:flex;gap:7px;align-items:center;margin-top:6px}
.send-row .spacer{flex:1}
#status{font-size:11px;color:var(--dim)}

/* modal */
.modal-veil{position:fixed;inset:0;background:rgba(4,9,11,.85);z-index:60;
  display:flex;padding:4vh 4vw;overflow:auto}
.manual-box{background:var(--panel);border:1px solid var(--rule);border-radius:3px;
  flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:820px;margin:0 auto}
.manual-hd{flex:none;display:flex;align-items:center;gap:10px;padding:11px 15px;
  border-bottom:1px solid var(--rule-soft)}
.manual-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 18px 28px;font-size:13px;line-height:1.65}
.manual-body h3{font-family:var(--label);text-transform:uppercase;letter-spacing:.14em;
  font-size:13px;color:var(--amber);margin:20px 0 7px;padding-bottom:5px;
  border-bottom:1px solid var(--rule-soft)}
.manual-body h3:first-child{margin-top:0}
.manual-body ol{margin:5px 0 9px 20px}
.manual-body li{margin-bottom:5px}
.manual-body code{font-family:var(--mono);font-size:12px;background:var(--panel-2);
  padding:1px 5px;border-radius:2px;border:1px solid var(--rule-soft)}
.manual-body .mnote{border-left:3px solid var(--phos);background:rgba(107,184,204,.06);
  padding:8px 11px;border-radius:2px;margin:8px 0;font-size:12.5px}
.manual-body .mwarn{border-left:3px solid var(--over);background:rgba(217,85,63,.07);
  padding:8px 11px;border-radius:2px;margin:8px 0;font-size:12.5px}

/* hamburguer — só mobile */
#btnRack{display:none}
#btnMore{display:none}

/* ===================== MOBILE ===================== */
@media(max-width:860px){
  #btnRack{display:inline-block}
  #btnMore{display:inline-block}
  header{position:relative;padding:6px 10px;gap:7px}
  .brand{font-size:14px;letter-spacing:.14em}
  #taskTitle{font-size:13px;padding:6px 8px}

  /* ações secundárias viram menu suspenso, para não espremer o título */
  .hdr-actions{
    display:none;position:absolute;top:100%;right:8px;margin-top:4px;
    background:var(--panel);border:1px solid var(--rule);border-radius:4px;
    padding:7px;flex-direction:column;gap:5px;z-index:45;min-width:150px;
    box-shadow:0 8px 20px rgba(0,0,0,.45);
  }
  .hdr-actions.aberto{display:flex}
  .hdr-actions button{width:100%;text-align:left;padding:8px 10px;font-size:11px}

  #body{grid-template-columns:1fr;grid-template-rows:auto minmax(0,1fr)}

  /* rack: gaveta deslizante */
  #rack{
    border-right:none;border-bottom:1px solid var(--rule);
    max-height:0;overflow:hidden;padding:0 11px;
    transition:max-height .3s cubic-bezier(.4,0,.2,1),padding .25s;
  }
  #rack.aberto{
    max-height:52vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;padding:11px 11px 22px;
  }

  /* display compacto */
  #display{margin:7px 8px 0;border-radius:4px;padding:6px}
  #annun{padding:2px 6px 5px;gap:7px}
  #annun .an{font-size:9px;letter-spacing:.12em}
  #annun .tk{font-size:9px}
  #btnClearTurns{padding:2px 6px;font-size:9px}

  .turn-body{font-size:12px;padding:2px 9px 8px}
  .turn-hd .meta{display:none}
  .lcd-idle .mestre{width:min(160px,52%)}
  #jury{grid-template-columns:1fr}
  .jcol-body{max-height:200px}

  /* console mobile */
  #console{padding:7px 8px 10px}
  .console-inner{padding:8px}
  .mode-row{gap:4px;margin-bottom:5px}
  .mode-btn{padding:4px 8px;font-size:10px;letter-spacing:.06em}
  #modeHint{display:none}
  #routerPick{gap:4px}

  /* prompt empilhado: textarea → botões */
  .prompt-row{flex-direction:column;gap:5px;align-items:stretch}
  .prompt-side{flex-direction:row;gap:5px}
  #prompt{
    min-height:58px;max-height:110px;
    font-size:16px; /* evita zoom iOS */
    width:100%;
  }
  #btnMic{flex:0 0 auto;padding:12px 16px;font-size:17px}
  #btnSend{flex:1;padding:12px;font-size:12px}
  .send-row{margin-top:4px}
  #status{font-size:10px}
  #console{padding-bottom:calc(10px + env(safe-area-inset-bottom));}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <header>
    <button id="btnRack" class="ghost tiny" aria-expanded="false" aria-controls="rack" title="Canais e configurações">☰</button>
    <div class="brand">Bancada<span>IA</span></div>
    <input id="taskTitle" placeholder="Nome da tarefa…">
    <button id="btnMore" class="ghost tiny" aria-expanded="false" aria-haspopup="true" title="mais opções">⋮</button>
    <div class="hdr-actions">
      <button id="btnManual" class="ghost">Manual</button>
      <button id="btnImg" class="ghost">Imagem</button>
      <button id="btnExport" class="ghost">Exportar</button>
      <button id="btnImport" class="ghost">Importar</button>
      <button id="btnWipe" class="ghost">Zerar</button>
    </div>
  </header>

  <div id="body">
    <aside id="rack">
      <div class="sect">
        <div class="sect-hd">Canais</div>
        <div id="chans"></div>
        <p class="hint" style="margin-top:7px">Cada pessoa usa a própria chave, criada de graça no site de cada IA — clique em <b>Manual</b> para o passo a passo. As chaves ficam só no <code>localStorage</code> deste navegador.</p>
      </div>
      <div class="sect">
        <div class="sect-hd">Carga do contexto</div>
        <div id="loadMeters"></div>
      </div>
      <div class="sect">
        <div class="sect-hd">Perfil do projeto</div>
        <div class="mode-row" id="perfis"></div>
        <textarea id="sysCustom" style="min-height:80px;display:none" placeholder="Instruções que vão em toda requisição."></textarea>
      </div>
      <div class="sect">
        <div class="sect-hd">Missão</div>
        <textarea id="brief" style="min-height:58px" placeholder="O que precisa ser feito, no total."></textarea>
      </div>
      <div class="sect">
        <div class="sect-hd">Arquivos
          <button id="btnAddFile" class="tiny ghost">+ colar</button>
          <button id="btnUpload" class="tiny ghost">+ abrir</button>
          <input type="file" id="fileInput" multiple accept=".mq5,.mqh,.mq4,.txt,.md,.json,.csv,.js,.py,.html,.css" hidden>
        </div>
        <div id="files"></div>
      </div>
    </aside>

    <section id="benchCol">
      <div id="display">
        <div id="annun">
          <span class="an" data-an="router">Roteador</span>
          <span class="an" data-an="jury">Júri</span>
          <span class="an" data-an="pipeline">Pipeline</span>
          <span class="spacer"></span>
          <span id="ctxTag" class="tk"></span>
          <button id="btnClearTurns" class="tiny ghost">× limpar</button>
        </div>
        <div id="lcd">
          <div id="juryWrap" style="display:none">
            <div class="jury-hd">Júri — compare e adote uma resposta</div>
            <div id="jury"></div>
          </div>
          <div id="turns"></div>
        </div>
      </div>

      <div id="console">
        <div class="console-inner">
          <div class="mode-row">
            <span class="lab" style="font-size:10px;color:var(--dim)">Modo</span>
            <button class="mode-btn sel" data-mode="router">Roteador</button>
            <button class="mode-btn" data-mode="jury">Júri</button>
            <button class="mode-btn" data-mode="pipeline">Pipeline</button>
            <span id="modeHint" class="hint" style="margin-left:4px"></span>
          </div>
          <div id="routerPick" class="mode-row"></div>
          <div class="prompt-row">
            <textarea id="prompt" rows="2" placeholder="Escreva ou dite aqui…"></textarea>
            <div class="prompt-side">
              <button id="btnMic" class="ghost" title="ditar pelo microfone (pt-BR)">🎙</button>
              <button id="btnSend" class="primary">Enviar</button>
            </div>
          </div>
          <div class="send-row">
            <span id="status"></span>
            <span class="spacer"></span>
            <button id="btnPonte" class="tiny ghost">Ponte</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
"use strict";
const PROVIDERS={
  gemini:{name:"Gemini",kind:"gemini",caps:"250K TPM · 20/dia",tpm:250000,ctx:1048576,rpd:20,
    models:["gemini-3.5-flash","gemini-3.1-flash-lite","gemini-3-flash-preview","gemini-2.5-flash"],
    keyUrl:"https://aistudio.google.com/apikey",
    url:(m,k)=>`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${encodeURIComponent(k)}`,

function buildContext(userText){
  const parts=[];
  if(S.brief.trim())parts.push("## Missão\n"+S.brief.trim());
  const on=S.files.filter(f=>f.on);
  if(on.length)parts.push("## Arquivos\n"+on.map(f=>`### ${f.name}\n\`\`\`\n${f.content}\n\`\`\``).join("\n\n"));
  const msgs=[];
  if(parts.length){msgs.push({role:"user",content:parts.join("\n\n")});msgs.push({role:"assistant",content:"Contexto recebido. Pode mandar a tarefa."});}
  for(const t of S.turns)if(t.pinned)msgs.push({role:t.role,content:t.content});
  if(userText)msgs.push({role:"user",content:userText});
  return msgs;
}

function authHeaders(id){

async function xfer(url,opts){
  let r;
  try{r=await fetch(url,opts)}catch(e){throw new Error("Falha de rede — sem internet, ou o provedor saiu do ar.")}
  const txt=await r.text();
  let data;try{data=JSON.parse(txt)}catch(e){throw new Error(`HTTP ${r.status}: ${txt.slice(0,200)}`)}
  if(!r.ok){
    const m=data?.error?.message||data?.message||`HTTP ${r.status}`;
    if(r.status===429)throw new Error("429 — cota estourada neste canal. "+m);
    if(r.status===402||/payment required|billing|insufficient credit|quota exceeded for quota metric/i.test(m))throw new Error("Modelo pago neste provedor. Escolha outro modelo.");
    if(/Expected OAuth|CREDENTIALS_MISSING|missing required authentication/i.test(m))throw new Error("A chave não chegou ao provedor. Confira o campo Chave.");
    if(r.status===400&&/api.?key/i.test(m))throw new Error("Chave rejeitada. Confira se colou só a chave.");
    if(/data policy|Enable prompt training/i.test(m))throw new Error("Este :free exige autorização de treino. Escolha outro :free.");
    if(/no longer available/i.test(m))throw new Error("Modelo aposentado. Clique em 'testar chave'.");
    if(/models\/[^ ]+ is not found|not found for API version/i.test(m))throw new Error("Modelo não existe para esta chave. Clique em 'testar chave'.");
    throw new Error(m);
  }
  return data;
}

async function probeChannel(id){

  if(!k)throw new Error("Cole a chave primeiro.");
  const url=typeof P.listUrl==="function"?P.listUrl(k):P.listUrl;
  const data=await xfer(url,{method:"GET",headers:authHeaders(id)});
  let list;
  if(P.kind==="gemini")list=(data.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes("generateContent")).map(m=>(m.name||"").replace(/^models\//,""));
  else if(Array.isArray(data))list=data.map(m=>m.id||m.name);
  else list=(data.data||[]).map(m=>m.id);
  list=list.filter(Boolean).sort();
  if(!list.length)throw new Error("A chave funciona, mas nenhum modelo voltou.");
  return list;
}

  L.push(`chave    : ${k.length} chars ${k?"· "+maskKey(k):"· VAZIA"}`);
  if(/\s/.test(k))L.push(`           ⚠ há espaço ou quebra DENTRO da chave`);
  L.push(`modelo   : ${modelOf(id)||"VAZIO"}`);
  L.push(`origem   : ${location.origin} ${location.protocol==="file:"?"(file:// = origin null)":""}`);L.push("");
  const url1=typeof P.listUrl==="function"?P.listUrl(k):P.listUrl;
  L.push(`1) GET ${maskUrl(url1)}`);
  try{const d=await xfer(url1,{method:"GET",headers:authHeaders(id)});const n=P.kind==="gemini"?(d.models||[]).length:(d.data||[]).length;L.push(`   ✓ 200 — ${n} modelos visíveis`)}catch(e){L.push(`   ✕ ${e.message}`)}
  L.push("");
  const url2=P.kind==="gemini"?P.url(modelOf(id)||"x",k):P.url(modelOf(id),k);
  L.push(`2) POST ${maskUrl(url2)}`);
  try{const r=await callChannel(id,[{role:"user",content:"Responda só: ok"}]);L.push(`   ✓ respondeu: ${JSON.stringify(r.text.slice(0,40))}`)}catch(e){L.push(`   ✕ ${e.message}`)}

  L.push("1 ✓ e 2 ✕  → chave boa; problema no POST (modelo ou corpo).");
  L.push("1 ✕ e 2 ✕  → chave não chegou. Recole no campo.");
  L.push("ambos ✕ 'falha de rede' → sem internet ou provedor fora do ar.");
  return L.join("\n");
}

async function autoPick(id,list){
  const C=S.chans[id];
  const util=list.filter(m=>!/image|tts|audio|embed|robotics|lyria|banana|computer-use|whisper|guard|vision/i.test(m));
  const rank=m=>(/coder|code/i.test(m)?200:0)+(/flash|instruct|versatile/i.test(m)?100:0)+(/preview/i.test(m)?-30:0)+(/lite|mini|small|8b|4b/i.test(m)?-20:0)+(parseFloat((m.match(/(\d+\.?\d*)/)||[0])[0])||0);
  const fila=util.sort((a,b)=>rank(b)-rank(a)).slice(0,3);
  const rejeitados=[],antes=modelOf(id);
  for(const m of fila){
    C.model=m;
    try{await callChannel(id,[{role:"user",content:"Responda só: ok"}]);return{model:m,rejeitados}}
    catch(e){if(/no longer available|is not found|not supported|não existe|é pago|payment/i.test(e.message)){rejeitados.push(`${m} — ${e.message.slice(0,50)}`);continue}C.model=antes;throw e}
  }
  C.model=antes;throw new Error("Nenhum dos 3 melhores respondeu. "+rejeitados.join(" | "));
}

async function callChannel(id,msgs,signal){
  const P=PROVIDERS[id],C=S.chans[id];
  if(!C.key.trim())throw new Error("Sem chave configurada.");
  if(!modelOf(id))throw new Error("Sem modelo. Clique em 'testar chave' para pegar a lista.");
  let url,opts;
  if(P.kind==="gemini"){
    url=P.url(modelOf(id),C.key.trim());
    opts={method:"POST",headers:Object.assign({"Content-Type":"application/json"},authHeaders(id)),
      body:JSON.stringify({systemInstruction:{parts:[{text:sysTxt()}]},
        contents:msgs.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),
        generationConfig:{temperature:0.2,maxOutputTokens:32768}})};
  }else{
    url=P.url(modelOf(id),C.key.trim());
    opts={method:"POST",headers:Object.assign({"Content-Type":"application/json"},authHeaders(id)),
      body:JSON.stringify({model:modelOf(id),messages:[{role:"system",content:sysTxt()},...msgs],temperature:0.2,max_tokens:8192})};
  }
  opts.signal=signal;
  const data=await xfer(url,opts);bump(id);
  if(P.kind==="gemini"){
    const c=data.candidates?.[0];
    if(!c)throw new Error("Resposta vazia"+(data.promptFeedback?" (bloqueada pelo filtro)":""));
    const out=(c.content?.parts||[]).filter(p=>!p.thought).map(p=>p.text||"").join("");
    if(!out){if(c.finishReason==="MAX_TOKENS")throw new Error("Orçamento de tokens esgotado. Peça um trecho menor.");throw new Error("Resposta vazia"+(c.finishReason?" — parou em: "+c.finishReason:"."))}
    if(c.finishReason==="MAX_TOKENS")setStatus("Resposta cortada — peça a continuação.",true);
    const u=data.usageMetadata||{};
    return{text:out,used:{in:u.promptTokenCount,out:u.candidatesTokenCount,think:u.thoughtsTokenCount,total:u.totalTokenCount}};
  }else{
    const ch=data.choices?.[0];if(!ch)throw new Error("Resposta vazia.");
    const u=data.usage||{};
    return{text:ch.message?.content||"",used:{in:u.prompt_tokens,out:u.completion_tokens,think:u.completion_tokens_details?.reasoning_tokens,total:u.total_tokens}};
  }
}

function renderMeters(){
  const el=$("#loadMeters");el.innerHTML="";
  const t=ctxTokens();
  const live=Object.keys(PROVIDERS).filter(id=>S.chans[id].on);
  if(!live.length){el.innerHTML=`<div class="empty">Ligue um canal para ver a carga.</div>`;}
  for(const id of live){
    const P=PROVIDERS[id];
    const teto=Math.min(P.tpm,P.ctx||P.tpm);
    const qual=teto===P.ctx&&P.ctx<P.tpm?"contexto":"TPM";
    const pct=(t/teto)*100,over=pct>100;
    const n=usedToday(id),cap=rpdOf(id);
    const dpct=(n/cap)*100,dover=n>=cap;
    const d=document.createElement("div");d.className="meter";
    d.innerHTML=`<div class="meter-top"><span class="meter-cap">${P.name}</span><span class="readout ${over?"over":""}">${over?"1.":pct.toFixed(0)+"%"}</span></div>
      <div class="scale"><div class="fill ${over?"over":pct>75?"warn":""}" style="width:${Math.min(pct,100)}%"></div></div>
      <div class="meter-sub">${t.toLocaleString("pt-BR")} / ${teto.toLocaleString("pt-BR")} ${qual}${over?" — não passa":""}</div>
      <div class="meter-top" style="margin-top:4px"><span class="meter-cap" style="color:var(--dimmer)">cota de hoje</span><span class="readout ${dover?"over":""}" style="font-size:11px">${dover?"1.":n+"/"+cap}</span></div>
      <div class="scale" style="height:5px"><div class="fill ${dover?"over":dpct>70?"warn":""}" style="width:${Math.min(dpct,100)}%"></div></div>
      <div class="meter-sub">${dover?"esgotada — zera às 5h":(cap-n)+" envios restantes"}</div>`;
    el.appendChild(d);
  }
  const cost=S.mode==="jury"?Math.max(live.length,1):S.mode==="pipeline"?3:1;
  $("#ctxTag").textContent=t.toLocaleString("pt-BR")+" tok · "+cost+(cost>1?" envios":" envio");
}

function usoTxt(u){
  if(!u)return"";if(typeof u==="number")return" · "+u+" tot";
  const p=[];
  if(u.in)p.push(u.in.toLocaleString("pt-BR")+" ent");
  if(u.out)p.push(u.out.toLocaleString("pt-BR")+" sai");
  if(u.think)p.push(u.think.toLocaleString("pt-BR")+" pens.");
  return p.length?" · "+p.join(" · "):"";
}

function addTurn(o){const t=Object.assign({id:uid(),pinned:true,ts:Date.now()},o);S.turns.push(t);save();renderTurns();renderMeters();return t.id}
function undoTurn(id,text){
  S.turns=S.turns.filter(x=>x.id!==id);
  if(text&&!$("#prompt").value.trim()){$("#prompt").value=text;fitPrompt()}
  save();renderTurns();renderMeters();

function fitPrompt(){const p=$("#prompt");p.style.height="auto";p.style.height=Math.min(p.scrollHeight,160)+"px"}

async function send(){
  if(busy)return;syncKeys();
  const text=$("#prompt").value.trim();
  if(!text){setStatus("Escreva alguma coisa.",true);return}
  const live=Object.keys(PROVIDERS).filter(id=>S.chans[id].on&&S.chans[id].key.trim());
  if(!live.length){setStatus("Nenhum canal ligado com chave. Veja o Manual (☰ → Manual).",true);return}
  busy=true;$("#btnSend").disabled=true;
  const vivos=live,msgs=buildContext(text);let uid_user=null;
  try{
    if(S.mode==="router"){
      const id=live.includes(S.router)?S.router:live[0];
      setStatus(`Falando com ${PROVIDERS[id].name}…`);
      uid_user=addTurn({role:"user",content:text});
      $("#prompt").value="";fitPrompt();
      const r=await callChannel(id,msgs);
      addTurn({role:"assistant",provider:id,model:S.chans[id].model,content:r.text,used:r.used});
      setStatus("");
    }else if(S.mode==="jury"){
      uid_user=addTurn({role:"user",content:text,pinned:false});
      $("#prompt").value="";fitPrompt();
      $("#juryWrap").style.display="block";
      const jury=$("#jury");jury.innerHTML="";
      setStatus(`${vivos.length} canais respondendo…`);
      const cols={};
      vivos.forEach(id=>{
        const c=document.createElement("div");c.className="jcol";
        c.innerHTML=`<div class="jcol-hd"><span class="who">${PROVIDERS[id].name}</span><span class="spin"></span></div><div class="jcol-body"></div>`;
        jury.appendChild(c);cols[id]=c;
      });
      lcdScrollBottom();
      await Promise.all(vivos.map(async id=>{
        const c=cols[id];
        try{
          const r=await callChannel(id,msgs);
          c.querySelector(".spin").remove();c.querySelector(".jcol-body").textContent=r.text;
          const b=document.createElement("button");b.className="tiny";b.textContent="adotar";
          b.onclick=()=>{
            const q=S.turns.find(x=>x.id===uid_user);if(q)q.pinned=true;
            addTurn({role:"assistant",provider:id,model:S.chans[id].model,content:r.text,used:r.used});
            $("#juryWrap").style.display="none";setStatus(`Adotado: ${PROVIDERS[id].name}`);
          };
          c.querySelector(".jcol-hd").appendChild(b);
        }catch(e){c.classList.add("err");c.querySelector(".spin")?.remove();c.querySelector(".jcol-body").textContent="✕ "+e.message}
      }));
      setStatus("Compare e adote uma resposta.");
    }else{
      if(vivos.length<2){setStatus("Pipeline precisa de 2 canais ligados.",true);busy=false;$("#btnSend").disabled=false;return}
      const[a,b]=vivos;
      uid_user=addTurn({role:"user",content:text});
      $("#prompt").value="";fitPrompt();
      setStatus(`1/3 ${PROVIDERS[a].name} escrevendo…`);
      const r1=await callChannel(a,msgs);
      addTurn({role:"assistant",provider:a,model:S.chans[a].model,content:r1.text,used:r1.used,pinned:false});
      setStatus(`2/3 ${PROVIDERS[b].name} revisando…`);
      const rev=[...msgs,{role:"assistant",content:r1.text},{role:"user",content:"Revise a resposta acima. Aponte erros concretos. Se estiver correta, diga 'sem reparos' e pare."}];
      const r2=await callChannel(b,rev);
      addTurn({role:"assistant",provider:b,model:S.chans[b].model,content:"REVISÃO\n\n"+r2.text,used:r2.used,pinned:false});
      setStatus(`3/3 ${PROVIDERS[a].name} consolidando…`);
      const fin=[...rev,{role:"assistant",content:r2.text},{role:"user",content:"Considerando a revisão, entregue a versão final. Só o resultado."}];
      const r3=await callChannel(a,fin);
      addTurn({role:"assistant",provider:a,model:S.chans[a].model,content:r3.text,used:r3.used});
      setStatus("Pipeline concluído.");
    }
  }catch(e){
    const houveResposta=S.turns.some(x=>x.role==="assistant"&&x.ts>(S.turns.find(y=>y.id===uid_user)?.ts||Infinity));
    if(uid_user&&!houveResposta)undoTurn(uid_user,text);
    setStatus(e.message,true);
  }
  busy=false;$("#btnSend").disabled=false;
}

  a.download=(S.title||"tarefa").replace(/[^\w\-]+/g,"_").toLowerCase()+".bancada.json";

function importState(){
  const i=document.createElement("input");i.type="file";i.accept=".json";
  i.onchange=()=>{
    const f=i.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const p=JSON.parse(r.result);
        const keys={};for(const id in S.chans)keys[id]=S.chans[id].key;
        S=Object.assign(S,p);
        for(const id in PROVIDERS){
          S.chans[id]=Object.assign({on:false,key:"",model:PROVIDERS[id].models[0]||""},S.chans[id]||{});
          if(typeof S.chans[id].model!=="string")S.chans[id].model=PROVIDERS[id].models[0]||"";
          if(!S.chans[id].key)S.chans[id].key=keys[id]||"";
        }
        save();boot();setStatus("Tarefa carregada.");
      }catch(e){setStatus("JSON inválido.",true)}
    };r.readAsText(f);
  };i.click();
}

const IMG_TAM=["1024x1024","768x768","512x512","1024x576","576x1024"];
let imgModal=null,imgSel=-1;const imgHist=[];
const imgURL=(texto,w,h,estilo,seed)=>"https://image.pollinations.ai/prompt/"+encodeURIComponent(texto.trim()+(IMG_ESTILOS[estilo]?.[0]||""))+`?width=${w}&height=${h}&nologo=true&model=flux&seed=${seed}`;
function fecharImagem(){if(imgModal)imgModal.style.display="none"}
function abrirImagem(){
  if(imgModal){imgModal.style.display="flex";imgModal.querySelector(".ip").focus();return}
  imgModal=document.createElement("div");
  imgModal.style.cssText="position:fixed;inset:0;background:rgba(4,9,11,.85);z-index:60;display:flex;padding:3vh 3vw";
  imgModal.innerHTML=`<style>
    #ib2{background:var(--panel);border:1px solid var(--rule);border-radius:3px;flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    #ib2 .ihd{flex:none;display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid var(--rule-soft)}
    #ib2 .ibody{flex:1;display:flex;gap:11px;padding:11px;min-height:0}
    #ib2 .ictl{flex:none;width:270px;display:flex;flex-direction:column;gap:7px;overflow-y:auto}
    #ib2 .istg{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0;min-height:0}
    #ib2 .ic{flex:1;min-height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid var(--rule-soft);border-radius:2px;background:var(--panel-2)}
    #ib2 .ic img{width:100%;height:100%;object-fit:contain;display:block}
    #ib2 .ih{flex:none;height:72px;display:flex;gap:5px;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;align-items:center;-webkit-overflow-scrolling:touch}
    #ib2 .ithumb{flex:0 0 auto;width:62px;height:62px;object-fit:cover;cursor:pointer;border:2px solid var(--rule);border-radius:2px;opacity:.75}
    #ib2 .ithumb:hover{border-color:var(--amber-dim);opacity:1}#ib2 .ithumb.sel{border-color:var(--amber);opacity:1}
    #ib2 select,#ib2 textarea{width:100%;background:var(--panel-2);border:1px solid var(--rule-soft);color:var(--ink);font-family:var(--body);font-size:13px;padding:6px 8px;border-radius:2px}
    #ib2 textarea{flex:1 1 auto;resize:none;min-height:120px;font-size:14px;line-height:1.55}
    #ib2 select:focus,#ib2 textarea:focus{outline:none;border-color:var(--amber-dim)}
    #ib2 .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--rule);border-top-color:var(--amber);animation:imgspin .8s linear infinite}
    @keyframes imgspin{to{transform:rotate(360deg)}}
    @media(max-width:640px){#ib2 .ibody{flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}#ib2 .ictl{width:auto;overflow:visible}#ib2 textarea{flex:none;min-height:80px}#ib2 .ic{flex:none;height:38vw;min-height:140px}}
  </style>
  <div id="ib2">
    <div class="ihd">
      <span class="lab" style="color:var(--amber);font-size:12px">Gerador de imagens</span>
      <span class="hint" style="flex:1">Flux sem chave · Nano Banana pela chave Gemini</span>
      <button class="tiny ghost ix">✕</button>
    </div>
    <div class="ibody">
      <div class="ictl">
        <textarea class="ip" placeholder="ex.: bicicleta mountain bike numa trilha ao pôr do sol"></textarea>
        <div class="fld"><label>Motor</label><select class="im">${Object.keys(IMG_MOTORES).map(k=>`<option value="${k}">${IMG_MOTORES[k]}</option>`).join("")}</select></div>
        <div class="fld"><label>Estilo</label><select class="ie">${Object.keys(IMG_ESTILOS).map(k=>`<option value="${k}">${IMG_ESTILOS[k][1]}</option>`).join("")}</select></div>
        <div class="fld"><label>Tamanho</label><select class="it">${IMG_TAM.map(t=>`<option value="${t}">${t.replace("x"," × ")}</option>`).join("")}</select></div>
        <button class="primary ig">Gerar</button>
        <button class="ghost ib" disabled>Baixar selecionada</button>
        <span class="hint is" style="min-height:14px">Ctrl+Enter também gera.</span>
      </div>
      <div class="istg">
        <div class="ic"><span class="hint">A imagem aparece aqui.</span></div>
        <div class="ih"><span class="hint">Histórico da sessão.</span></div>
      </div>
    </div>
  </div>`;
  document.body.appendChild(imgModal);
  const q=s=>imgModal.querySelector(s);
  const ip=q(".ip"),st=q(".is"),ic=q(".ic"),ih=q(".ih"),bg=q(".ig"),bb=q(".ib");
  const aviso=(m,ruim)=>{st.textContent=m;st.style.color=ruim?"var(--over)":"var(--dim)"};
  const seleciona=i=>{if(!imgHist[i])return;imgSel=i;ic.innerHTML="";const img=new Image();img.src=imgHist[i].url;img.alt=imgHist[i].prompt;ic.appendChild(img);ih.querySelectorAll(".ithumb").forEach(t=>t.classList.toggle("sel",+t.dataset.i===i));bb.disabled=false};
  const pintaHist=()=>{ih.innerHTML=imgHist.map((it,i)=>`<img class="ithumb" data-i="${i}" src="${it.url}" title="${esc(it.prompt)}" alt="${esc(it.prompt)}">`).join("");ih.querySelectorAll(".ithumb").forEach(t=>t.onclick=()=>seleciona(+t.dataset.i))};
  const fim=ok=>{bg.disabled=false;bg.textContent="Gerar";if(!ok){ic.innerHTML='<span class="hint">nada ainda</span>';if(imgSel>=0)seleciona(imgSel)}};
  const guarda=(url,texto)=>{imgHist.unshift({url,prompt:texto});pintaHist();seleciona(0)};
  const geraPollinations=texto=>{
    const[w,h]=q(".it").value.split("x").map(Number);
    const url=imgURL(texto,w,h,q(".ie").value,Math.floor(Math.random()*1e6));
    const img=new Image();
    img.onload=()=>{guarda(url,texto);aviso("Pronta. Gerar de novo dá outra variação.");fim(true)};
    img.onerror=()=>{aviso("Falhou — tente de novo.",true);fim(false)};
    img.src=url;
  };
  const geraGemini=async texto=>{
    const k=(S.chans.gemini?.key||"").trim();
    if(!k){aviso("Cole a chave no canal Gemini primeiro.",true);fim(false);return}
    const full=texto+(IMG_ESTILOS[q(".ie").value]?.[0]||"");
    try{
      const d=await xfer(`https://generativelanguage.googleapis.com/v1beta/models/${IMG_GEMINI_MODEL}:generateContent?key=${encodeURIComponent(k)}`,
        {method:"POST",headers:{"Content-Type":"application/json","x-goog-api-key":k},
         body:JSON.stringify({contents:[{parts:[{text:full}]}],generationConfig:{responseModalities:["TEXT","IMAGE"],imageConfig:{aspectRatio:IMG_ASPECT(q(".it").value)}}})});
      const parts=d.candidates?.[0]?.content?.parts||[];
      const inl=parts.find(p=>p.inlineData?.data);
      if(!inl){const recusa=parts.find(p=>p.text)?.text||d.promptFeedback?.blockReason||"";throw new Error("A API respondeu sem imagem"+(recusa?" — "+String(recusa).slice(0,120):"")+".")}
      const bytes=Uint8Array.from(atob(inl.inlineData.data),c=>c.charCodeAt(0));
      const url=URL.createObjectURL(new Blob([bytes],{type:inl.inlineData.mimeType||"image/png"}));
      guarda(url,texto);aviso("Pronta pelo Nano Banana.");fim(true);
    }catch(e){aviso(e.message,true);fim(false)}
  };
  bg.onclick=()=>{
    const texto=ip.value.trim();if(!texto){aviso("Escreva a descrição primeiro.",true);return}
    bg.disabled=true;bg.textContent="Gerando…";aviso("Gerando…");
    ic.innerHTML='<div class="spin"></div>';
    if(q(".im").value==="gemini")geraGemini(texto);else geraPollinations(texto);
  };
  bb.onclick=async()=>{
    const item=imgHist[imgSel];if(!item)return;bb.disabled=true;bb.textContent="Baixando…";
    try{
      const local=item.url.startsWith("blob:");
      const href=local?item.url:URL.createObjectURL(await(await fetch(item.url)).blob());
      const a=document.createElement("a");a.href=href;a.download=(item.prompt.slice(0,30).replace(/[^a-z0-9]+/gi,"_")||"imagem")+(local?".png":".jpg");a.click();
      if(!local)URL.revokeObjectURL(href);aviso("Baixada.");
    }catch(e){aviso("Download falhou — clique com o direito e salve.",true)}
    bb.disabled=false;bb.textContent="Baixar selecionada";
  };
  q(".ix").onclick=fecharImagem;
  imgModal.addEventListener("click",e=>{if(e.target===imgModal)fecharImagem()});
  document.addEventListener("keydown",e=>{if(e.key==="Escape"&&imgModal?.style.display!=="none")fecharImagem()});
  ip.addEventListener("keydown",e=>{if(e.key==="Enter"&&(e.ctrlKey||e.metaKey))bg.onclick()});
  ip.focus();
}

/* VOZ */
(function(){
  const btn=$("#btnMic");
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){btn.title="Reconhecimento de voz indisponível — use Chrome ou Edge.";btn.style.opacity=".4";btn.onclick=()=>setStatus("Ditado por voz não disponível neste navegador.",true);return}
  let rec=null,gravando=false,pararPedido=false;
  function insere(txt){const p=$("#prompt");const fim=p.value&&!/\s$/.test(p.value)?" ":"";p.value+=fim+txt;fitPrompt();renderMeters()}
  function para(){pararPedido=true;try{rec&&rec.stop()}catch(e){}}
  function comeca(){
    rec=new SR();rec.lang="pt-BR";rec.continuous=true;rec.interimResults=true;
    rec.onstart=()=>{gravando=true;pararPedido=false;btn.classList.add("rec");btn.title="gravando — clique para parar";setStatus("🎙 Ouvindo… clique no microfone para parar.")};
    rec.onresult=e=>{let parcial="";for(let i=e.resultIndex;i<e.results.length;i++){const r=e.results[i];if(r.isFinal)insere(r[0].transcript.trim());else parcial+=r[0].transcript}setStatus(parcial?"🎙 "+parcial:"🎙 Ouvindo…")};
    rec.onerror=e=>{gravando=false;btn.classList.remove("rec");
      if(e.error==="not-allowed"||e.error==="service-not-allowed")setStatus("Microfone bloqueado. Clique no cadeado da barra de endereço e permita.",true);
      else if(e.error==="no-speech")setStatus("Não ouvi nada — verifique o microfone.",true);
      else if(e.error==="audio-capture")setStatus("Nenhum microfone encontrado.",true);
      else if(e.error!=="aborted")setStatus("Erro no ditado: "+e.error,true)};
    rec.onend=()=>{if(gravando&&!pararPedido){try{rec.start();return}catch(e){}}gravando=false;btn.classList.remove("rec");btn.title="ditar pelo microfone (pt-BR)";setStatus("")};
    try{rec.start()}catch(e){setStatus("Não consegui iniciar o microfone: "+e.message,true)}
  }
  btn.onclick=()=>gravando?para():comeca();
})();

/* RACK MOBILE */
const rackEl=$("#rack"),rackBtn=$("#btnRack");
rackBtn.addEventListener("click",()=>{
  const aberto=rackEl.classList.toggle("aberto");
  rackBtn.setAttribute("aria-expanded",aberto);
  if(aberto){
    const fechar=e=>{if(!rackEl.contains(e.target)&&e.target!==rackBtn){rackEl.classList.remove("aberto");rackBtn.setAttribute("aria-expanded","false");document.removeEventListener("click",fechar);document.removeEventListener("touchstart",fechar)}};
    setTimeout(()=>{document.addEventListener("click",fechar);document.addEventListener("touchstart",fechar)},10);
  }
});

/* MENU DE MAIS OPÇÕES (mobile) */
(function(){
  const btn=$("#btnMore"), menu=$(".hdr-actions");
  if(!btn) return;
  btn.addEventListener("click",e=>{
    e.stopPropagation();
    const aberto=menu.classList.toggle("aberto");
    btn.setAttribute("aria-expanded",aberto);
    if(aberto){
      const fechar=ev=>{if(!menu.contains(ev.target)&&ev.target!==btn){menu.classList.remove("aberto");btn.setAttribute("aria-expanded","false");document.removeEventListener("click",fechar);document.removeEventListener("touchstart",fechar)}};
      setTimeout(()=>{document.addEventListener("click",fechar);document.addEventListener("touchstart",fechar)},10);
    }
  });
  menu.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{menu.classList.remove("aberto");btn.setAttribute("aria-expanded","false")}));
})();

/* ALTURA REAL DA TELA — o teclado do celular encolhe a visualViewport,
   não a layout viewport. Sem isto, o console fica escondido atrás do
   teclado e sobra pouco espaço pra digitar e ver a resposta da IA. */
(function(){
  const setAppH=()=>{
    const h=(window.visualViewport && window.visualViewport.height) || window.innerHeight;
    document.documentElement.style.setProperty("--app-h", h+"px");
  };
  setAppH();
  window.addEventListener("resize", setAppH);
  window.addEventListener("orientationchange", ()=>setTimeout(setAppH,150));
  if (window.visualViewport){
    window.visualViewport.addEventListener("resize", setAppH);
    window.visualViewport.addEventListener("scroll", setAppH);
  }
  /* ao focar o campo, o teclado sobe com uma pequena animação —
     recalcula depois dela e garante que o campo fique visível. */
  $("#prompt").addEventListener("focus", ()=>{
    setTimeout(()=>{ setAppH(); $("#prompt").scrollIntoView({block:"end", behavior:"smooth"}); }, 300);
  });
})();

/* BOOT */
function boot(){
  $("#taskTitle").value=S.title;
  $("#brief").value=S.brief;
  renderPerfis();renderChans();renderFiles();renderTurns();renderMode();renderMeters();
}
load();boot();fitPrompt();

$("#taskTitle").addEventListener("input",e=>{S.title=e.target.value;save()});
$("#brief").addEventListener("input",e=>{S.brief=e.target.value;save();renderMeters()});
$("#sysCustom").addEventListener("input",e=>{S.systemCustom=e.target.value;save();renderPerfis();renderMeters()});
$("#prompt").addEventListener("input",()=>{fitPrompt();renderMeters()});
$("#prompt").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}});
$("#btnSend").addEventListener("click",send);
$("#btnManual").addEventListener("click",abrirManual);
$("#btnPonte").addEventListener("click",abrirPonte);
$("#btnImg").addEventListener("click",abrirImagem);
$("#btnExport").addEventListener("click",exportState);
$("#btnImport").addEventListener("click",importState);
$("#btnClearTurns").addEventListener("click",()=>{
  if(!S.turns.length){setStatus("Histórico já está vazio.");return}
  if(!confirm(`Apagar ${S.turns.length} turno(s)?`))return;
  S.turns=[];save();$("#juryWrap").style.display="none";$("#jury").innerHTML="";renderTurns();renderMeters();setStatus("Histórico apagado.");
});
$("#btnWipe").addEventListener("click",()=>{
  if(!confirm("Apaga missão, arquivos e histórico. Chaves ficam. Continuar?"))return;
  S.title="";S.brief="";S.files=[];S.turns=[];save();boot();
});
document.querySelectorAll(".mode-btn[data-mode]").forEach(b=>b.addEventListener("click",()=>{S.mode=b.dataset.mode;save();renderMode();renderMeters()}));
$("#btnAddFile").addEventListener("click",()=>{const f={id:uid(),name:"trecho.mq5",content:"",on:true};S.files.push(f);save();renderFiles();editFile(f)});
$("#btnUpload").addEventListener("click",()=>$("#fileInput").click());
$("#fileInput").addEventListener("change",e=>{
  [...e.target.files].forEach(file=>{const r=new FileReader();r.onload=()=>{S.files.push({id:uid(),name:file.name,content:r.result,on:true});save();renderFiles();renderMeters()};r.readAsText(file)});
  e.target.value="";
});
</script>
